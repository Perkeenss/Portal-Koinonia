<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Niños | Koinonia</title>
    <link rel="stylesheet" href="calendarios.css">
    <link rel="icon" type="image/x-icon" href="imagenes/Icono-Koinonia.ico">
</head>
<body class="fade-in">

<nav class="navbar">
    <div class="nav-container">
        <a href="Inicio.html" class="logo-link">
            <img class="logo" alt="Iglesia Koinonia San Marcos" src="imagenes/SM1.png">
        </a>

        <button class="menu-toggle" id="mobile-menu" aria-label="Abrir menú">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <div class="nav-content" id="nav-list">
            <ul class="nav-links">
                <li><a href="Inicio.html" class="nav-item">Inicio</a></li>
                <li><a href="usuario.html" class="nav-item">Perfil</a></li>
                <li><a href="soporte.html" class="nav-item">Soporte</a></li>
                <li><a href="index.html" class="btn-salir">Salir</a></li>
            </ul>
            
            <div class="user-divider"></div>
            <a href="usuario.html" class="user-profile-link">
                <div class="user-section">
                    <span class="username">Admin Koinonia</span>
                    <div class="user-avatar-wrapper">
                        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Usuario" class="user-icon">
                    </div>
                </div>
            </a>
        </div>
    </div>
</nav>

    <div class="calendar-wrapper">
        <h2 class="calendar-title">Calendario de Niños: Diciembre 2025</h2>
        <div class="calendar-container" id="calendarGrid">
            </div>
    </div>

    <div id="miModal" class="modal-overlay">
        <div class="modal-box">
            <span class="modal-close" onclick="cerrarInfo()">&times;</span>
            <h3 id="fechaModal">Fecha</h3>
            <div class="divider"></div>
            <p id="servidoresModal">Información</p>
        </div>
    </div>

    <script>
        // Listado de Servidores asignados
        const servicios = {
            3: "Gabriela Menjivar (Enseñanza)<br>Adriana Peña",
            7: "Servidor Dominical A<br>Auxiliar Niños",
            10: "Servidor Miércoles<br>Auxiliar",
            14: "Servidor Dominical B<br>Auxiliar",
            17: "Servidor Miércoles<br>Auxiliar",
            21: "Servidor Dominical C<br>Auxiliar",
            24: "Servicio Especial Navidad",
            28: "Servidor Dominical D<br>Auxiliar",
            31: "Especial Fin de Año"
        };

        // Menú Móvil interactivo
        const menu = document.querySelector('#mobile-menu');
        const menuLinks = document.querySelector('#nav-list');
        menu.addEventListener('click', () => {
            menu.classList.toggle('is-active');
            menuLinks.classList.toggle('active');
        });

        // Generador de Calendario
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const diasSemana = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            grid.innerHTML = ''; 

            diasSemana.forEach(dia => {
                const h = document.createElement('div');
                h.className = 'day-header';
                h.innerText = dia;
                grid.appendChild(h);
            });

            const startingDay = 1; // 1 de Dic 2025 empieza en Lunes
            const daysInMonth = 31;

            for (let i = 0; i < startingDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day empty';
                grid.appendChild(empty);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const d = document.createElement('div');
                d.className = 'calendar-day';
                if (servicios[day]) {
                    d.classList.add('event');
                    d.onclick = () => abrirInfo(`Diciembre ${day}`, servicios[day]);
                    d.innerHTML = `<span class="day-num">${day}</span><div class="event-tag">Servicio</div>`;
                } else {
                    d.innerHTML = `<span class="day-num">${day}</span>`;
                }
                grid.appendChild(d);
            }
        }

        function abrirInfo(fecha, info) {
            document.getElementById('fechaModal').innerText = fecha;
            document.getElementById('servidoresModal').innerHTML = info;
            document.getElementById('miModal').classList.add('active');
        }

        function cerrarInfo() {
            document.getElementById('miModal').classList.remove('active');
        }

        window.onload = renderCalendar;
    </script>
</body>
</html>
